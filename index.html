<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff6b4a">
  <title>傾斜割り勘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">KANPAI CALCULATOR</p>
      <h1>傾斜割り勘</h1>
      <p>複数の会とグループをまとめて精算。</p>
    </header>

    <section class="card">
      <div class="section-heading">
        <div>
          <h2>会計</h2>
          <p>金額差はグループ順位ごとの差額です</p>
        </div>
        <button id="add-event" class="secondary-button" type="button">
          ＋ 会を追加
        </button>
      </div>
      <div id="events" class="events"></div>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <h2>参加者</h2>
          <p id="member-count">0人</p>
        </div>
        <button id="add-member" class="secondary-button" type="button">
          ＋ 参加者
        </button>
      </div>

      <p class="hint">
        固定額は必要な場合だけ入力してください。空欄なら自動計算します。
      </p>

      <div class="table-scroll">
        <table id="member-table">
          <thead id="member-head"></thead>
          <tbody id="member-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <h2>グループ設定</h2>
          <p>グループ全員の1人あたり固定額</p>
        </div>
      </div>

      <p class="hint">
        空欄は自動調整です。個人固定額がある場合はそちらを優先します。
      </p>

      <div class="table-scroll">
        <table id="group-table">
          <thead id="group-head"></thead>
          <tbody id="group-body"></tbody>
        </table>
      </div>
    </section>

    <button id="calculate" class="primary-button" type="button">
      割り勘を計算する
    </button>

    <p id="error" class="error" role="alert" aria-live="polite"></p>

    <section id="result-card" class="card result-card" hidden>
      <div class="section-heading">
        <div>
          <p class="eyebrow">RESULT</p>
          <h2>支払い金額</h2>
        </div>
        <button id="copy-result" class="secondary-button" type="button">
          結果をコピー
        </button>
      </div>

      <div class="table-scroll result-wrap">
        <table>
          <thead id="result-head"></thead>
          <tbody id="result-body"></tbody>
          <tfoot id="result-foot"></tfoot>
        </table>
      </div>

      <p id="copy-status" class="copy-status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
