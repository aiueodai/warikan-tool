<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff6b4a">
  <title>傾斜割り勘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">KANPAI CALCULATOR</p>
      <h1>傾斜割り勘</h1>
      <p>1次会も2次会も、まとめて気持ちよく精算。</p>
    </header>

    <section class="card">
      <div class="section-heading">
        <div>
          <h2>会計</h2>
          <p>会ごとの合計金額</p>
        </div>

        <button id="add-event" class="secondary-button" type="button">
          ＋ 会を追加
        </button>
      </div>

      <div id="events" class="events"></div>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <h2>参加者</h2>
          <p id="member-count">0人</p>
        </div>

        <button id="add-member" class="secondary-button" type="button">
          ＋ 参加者
        </button>
      </div>

      <p class="table-hint">各会に参加する人へチェックを入れてください。</p>

      <div class="table-scroll">
        <table class="member-table">
          <thead id="member-table-head"></thead>
          <tbody id="member-table-body"></tbody>
        </table>
      </div>
    </section>

    <button id="calculate" class="primary-button" type="button">
      割り勘を計算する
    </button>

    <p id="error" class="error" role="alert" aria-live="polite"></p>

    <section id="result-card" class="card result-card" hidden>
      <div class="section-heading">
        <div>
          <p class="eyebrow">RESULT</p>
          <h2>支払い金額</h2>
        </div>

        <button id="copy-result" class="secondary-button" type="button">
          結果をコピー
        </button>
      </div>

      <div class="table-scroll result-table-wrap">
        <table class="result-table">
          <thead id="result-table-head"></thead>
          <tbody id="result-table-body"></tbody>
          <tfoot id="result-table-foot"></tfoot>
        </table>
      </div>

      <p id="copy-status" class="copy-status" aria-live="polite"></p>
    </section>
  </main>

  <template id="event-template">
    <div class="event-row">
      <input
        class="event-name"
        type="text"
        maxlength="30"
        aria-label="会の名前"
      >

      <span class="yen-input">
        <input
          class="event-total"
          type="number"
          min="1"
          step="1"
          inputmode="numeric"
          placeholder="12000"
          aria-label="合計金額"
        >
        <b>円</b>
      </span>

      <button class="remove-button remove-event" type="button" aria-label="会を削除">
        ×
      </button>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
